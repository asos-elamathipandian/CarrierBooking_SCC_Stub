    - generic [ref=e36]:
      - generic [ref=e37]:
        - heading "📋 How this tool works" [level=3] [ref=e38]
        - paragraph [ref=e39]:
          - text: This tool generates a
          - strong [ref=e40]: VBKREQ XML
          - text: "(Vendor Booking Request) for submission to E2open TA and DavisTurner. The pipeline runs in four stages:"
        - generic [ref=e41]:
          - generic [ref=e42]: 📊 1 · Supplier uploads Excel
          - generic [ref=e43]: →
          - generic [ref=e44]: 📡 2 · Fetch Carrier ASN Feeds
          - generic [ref=e45]: →
          - generic [ref=e46]: 🗂 3 · Build Master Workbook
          - generic [ref=e47]: →
          - generic [ref=e48]: ⚡ 4 · Generate VBKREQ XML
          - generic [ref=e49]: →
          - generic [ref=e50]: 🚀 5 · Upload to E2open SFTP
        - paragraph [ref=e51]:
          - strong [ref=e52]: "Step 1 — Supplier Excel (two-sheet template):"
          - text: "The supplier fills in the downloadable template. The template has two data sheets:"
          - strong [ref=e53]: BOOKING_HEADER
          - text: (one row per PO — mandatory/defaulted booking fields) and
          - strong [ref=e54]: SKU_LINES
          - text: (one row per SKU — quantities, weights, carton details). A
          - strong [ref=e55]: FACTORY_LOOKUP
          - text: tab lists valid factory codes; selecting a
          - code [ref=e56]: Factory_ID
          - text: auto-fills name and address via VLOOKUP. Mandatory (pink) columns must be completed; defaulted (green) columns are pre-set and can be changed if needed.
        - paragraph [ref=e57]:
          - strong [ref=e58]: Booking_Group
          - text: "controls how POs are consolidated into bookings:"
          - emphasis [ref=e59]: Single Booking
          - text: = one VBKREQ per PO;
          - emphasis [ref=e60]: Multiple POs-BK001…BK025
          - text: = all POs sharing the same code are merged into one VBKREQ;
          - emphasis [ref=e61]: Multiple
          - text: = all POs in the upload combined into a single VBKREQ.
        - paragraph [ref=e62]:
          - strong [ref=e63]: "Factory_ID 9999 (Dummy Factory):"
          - text: If a real factory code is not yet known, use
          - code [ref=e64]: "9999"
          - text: . Address validation is skipped for this code — the VBKREQ will be generated without a factory address.
        - paragraph [ref=e65]:
          - strong [ref=e66]: "Stage 2 — Carrier Feed:"
          - text: The DavisTurner carrier ASN XML is fetched automatically from Azure Blob Storage keyed on the PO numbers from the supplier sheet, or uploaded manually. If no carrier ASN is found for any PO the pipeline stops at this stage — a retry or manual upload is required. The feed provides the ASN ID, supplier codes, shipping point, FC destination, country of origin, and line-level SKU quantities.
        - paragraph [ref=e67]:
          - strong [ref=e68]: "Stage 3 — Master Workbook:"
          - text: Supplier and carrier data are merged row-by-row (matched on PO + SKU). A MASTER sheet is produced. SKUs in the supplier template but absent from the carrier feed are flagged as warnings. The workbook is downloadable as an audit trail.
        - paragraph [ref=e69]:
          - strong [ref=e70]: "Stage 4 — VBKREQ XML:"
          - text: The MASTER rows are grouped per
          - code [ref=e71]: Booking_Group
          - text: and structured into the E2open VBKREQ schema. The booking reference (
          - code [ref=e72]: VB-XXXXX
          - text: ) is shown in the PO → VBKREQ Reference Map after generation. The XML filename follows the pattern
          - code [ref=e73]: DAVIESTN_E2ASOS_VBKREQ_1.0_<timestamp><ctrl>.xml
          - text: .
        - paragraph [ref=e74]:
          - strong [ref=e75]: "Stage 5 — SFTP upload:"
          - text: All generated XMLs are pushed to the E2open SFTP server in one batch. Bookings are reflected in E2open TA against the ASN shipments and DavisTurner receives the booking request through E2open.
