      - generic [ref=e62]:
        - heading "📋 How this tool works" [level=3] [ref=e63]
        - paragraph [ref=e64]:
          - text: This tool generates a
          - strong [ref=e65]: VBKREQ XML
          - text: "(Vendor Booking Request) for submission to E2open TA and DavisTurner. The UI is split into two independent sections:"
        - paragraph [ref=e66]: 📦 Booking — Steps 1 & 2
        - generic [ref=e67]:
          - generic [ref=e68]: 📊 1 · Upload Supplier Excel
          - generic [ref=e69]: →
          - generic [ref=e70]: 📡 2 · Fetch Carrier ASN Feed
          - generic [ref=e71]: →
          - generic [ref=e72]: 🗂 3 · Build Master Workbook
          - generic [ref=e73]: →
          - generic [ref=e74]: ⚡ 4 · Generate VBKREQ XML
          - generic [ref=e75]: →
          - generic [ref=e76]: 🚀 5 · Upload to E2open SFTP
        - paragraph [ref=e77]: ✕ Cancellation — standalone, no re-upload needed
        - generic [ref=e78]:
          - generic [ref=e79]: 🔍 Enter PO or VB Ref
          - generic [ref=e80]: →
          - generic [ref=e81]: 📂 Look up stored booking data
          - generic [ref=e82]: →
          - generic [ref=e83]: ⚡ Build cancellation VBKREQ (01 + 177)
          - generic [ref=e84]: →
          - generic [ref=e85]: 🚀 Upload to E2open SFTP
        - paragraph [ref=e86]:
          - strong [ref=e87]: "Step 1 — Supplier Excel (two-sheet template):"
          - text: "The supplier fills in the downloadable template. The template has two data sheets:"
          - strong [ref=e88]: PO Header
          - text: (one row per PO — mandatory/defaulted booking fields) and
          - strong [ref=e89]: PO Lines
          - text: (one row per SKU — quantities, weights, carton details). A
          - strong [ref=e90]: FACTORY_LOOKUP
          - text: tab lists valid factory codes; selecting a
          - code [ref=e91]: Factory_ID
          - text: auto-fills name and address via VLOOKUP. Mandatory (pink) columns must be completed; defaulted (green) columns are pre-set and can be changed if needed. The PO Header sheet pre-fills
          - code [ref=e92]: Traffic_Mode = CFS
          - text: and
          - code [ref=e93]: Booking_Group = Single Booking
          - text: as defaults.
        - paragraph [ref=e94]:
          - strong [ref=e95]: Booking_Group
          - text: "controls how POs are consolidated into bookings:"
          - emphasis [ref=e96]: Single Booking
          - text: = one VBKREQ per PO;
          - emphasis [ref=e97]: Multiple POs-BK001…BK025
          - text: = all POs sharing the same code are merged into one VBKREQ;
          - emphasis [ref=e98]: Multiple
          - text: = all POs in the upload combined into a single VBKREQ.
        - paragraph [ref=e99]:
          - strong [ref=e100]: "Factory_ID 9999 (Dummy Factory):"
          - text: If a real factory code is not yet known, use
          - code [ref=e101]: "9999"
          - text: . Address validation is skipped for this code — the VBKREQ will be generated without a factory address.
        - paragraph [ref=e102]:
          - strong [ref=e103]: "Step 2 — Booking Pipeline (single button):"
          - text: Step 2 is always visible but locked/dimmed until Step 1 completes successfully. Select Purpose Code (13 = New Submission, 15 = Re-Submission) then click
          - strong [ref=e104]: ⚡ Build VB & Upload to SFTP
          - text: ". All four stages (Fetch ASN → Build → Generate → Upload) run automatically and results appear in a single table: PO | ASN Ref(s) | VB Ref | VBKREQ File download. A tagged supplier template with prefilled booking refs is also available for download per result row."
        - paragraph [ref=e105]:
          - strong [ref=e106]: "Recent Booking History:"
          - text: The collapsible 🕑 panel below Step 2 shows all VBKREQs generated in the last 3 days, loaded automatically after each pipeline run. Click to expand.
        - paragraph [ref=e107]:
          - strong [ref=e108]: "Cancel Booking (standalone):"
          - text: Enter one or more PO numbers or VB Refs (e.g.
          - code [ref=e109]: "500034236929"
          - text: or
          - code [ref=e110]: VB-1000000025
          - text: ) in the Cancel Booking card at the bottom. Click
          - strong [ref=e111]: Look Up Existing Bookings
          - text: to verify the records exist in the generation log and confirm ✅ Ready to cancel status. Then click
          - strong [ref=e112]: Cancel & Upload to SFTP
          - text: — the system builds a VBKREQ with
          - code [ref=e113]: PurposeCd=01
          - text: ", reuses the original VB Ref, injects"
          - code [ref=e114]: DateTypeCd=177
          - text: (cancellation status date), and uploads. No supplier template re-upload is required.
        - generic [ref=e115]:
          - text: ⚠
          - strong [ref=e116]: "Legacy bookings:"
          - text: Bookings created before the current version of the tool will show
          - emphasis [ref=e117]: ⚠ No stored data (re-run booking first)
          - text: in the lookup panel. To enable cancellation for these, re-run the pipeline with the original supplier template once to refresh the stored master row data in the generation log.
